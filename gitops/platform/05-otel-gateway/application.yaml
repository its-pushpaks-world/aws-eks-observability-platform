# gitops/platform/05-otel-gateway/application.yaml

apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: otel-gateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "50"

spec:
  project: default

  destination:
    server: https://kubernetes.default.svc
    namespace: observability

  sources:
    - repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
      chart: opentelemetry-collector
      targetRevision: 0.93.3
      helm:
        releaseName: otel-gateway
        valueFiles:
          - $values/gitops/platform/05-otel-gateway/values.yaml

    - repoURL: https://github.com/its-pushpaks-world/aws-eks-observability-platform.git
      targetRevision: main
      ref: values

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
