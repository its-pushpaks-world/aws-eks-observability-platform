# gitops/platform/01-mimir/application.yaml

apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: mimir
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"

spec:
  project: default

  destination:
    server: https://kubernetes.default.svc
    namespace: observability

  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: mimir-distributed
      targetRevision: 5.5.1
      helm:
        releaseName: mimir
        valueFiles:
          - $values/gitops/platform/01-mimir/values.yaml

    - repoURL: https://github.com/its-pushpaks-world/aws-eks-observability-platform.git
      targetRevision: main
      ref: values

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
