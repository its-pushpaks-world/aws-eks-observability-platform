# gitops/platform/04-grafana/values.yaml

replicas: 1

adminUser: admin
adminPassword: admin123-change-me

service:
  type: ClusterIP
  port: 80

persistence:
  enabled: true
  size: 2Gi

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi

grafana.ini:
  server:
    root_url: "%(protocol)s://%(domain)s/"
  analytics:
    check_for_updates: false
  log:
    level: warn

datasources:
  datasources.yaml:
    datasources:
      - name: Mimir
        uid: mimir
        type: prometheus
        access: proxy
        isDefault: true
        url: http://mimir-gateway.observability.svc.cluster.local/prometheus
        jsonData:
          httpHeaderName1: X-Scope-OrgID
          timeInterval: 30s
        secureJsonData:
          httpHeaderValue1: "1"

      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://loki-read.observability.svc.cluster.local:3100
        jsonData:
          httpHeaderName1: X-Scope-OrgID
        secureJsonData:
          httpHeaderValue1: self-monitoring

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: Kubernetes
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default

dashboards:
  default:
    node-exporter-full:
      gnetId: 1860
      revision: 37
      datasource: Mimir

    kubernetes-cluster:
      gnetId: 7249
      revision: 1
      datasource: Mimir
