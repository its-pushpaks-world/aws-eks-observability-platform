# gitops/values/dev/kube-prometheus-stack-values.yaml

grafana:
  enabled: false

prometheus:
  prometheusSpec:
    retention: 6h
    resources:
      requests:
        cpu: 150m
        memory: 512Mi
      limits:
        memory: 1Gi
    remoteWrite:
      - url: http://mimir-distributor.observability.svc.cluster.local:8080/api/v1/push
        headers:
          X-Scope-OrgID: "dev"

alertmanager:
  alertmanagerSpec:
    replicas: 1
